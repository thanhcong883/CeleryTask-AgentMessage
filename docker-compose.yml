version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis_broker
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery --app=tasks worker --loglevel=info -P solo
    volumes:
      - .:/app
    depends_on:
      - redis
    env_file:
      - .env

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A tasks beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    volumes:
      - .:/app
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  redis_data:
