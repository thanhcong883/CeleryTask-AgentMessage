services:
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass redispass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bot_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_management_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - celery_beat_data:/app/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - bot_network

volumes:
  redis_data:
  celery_beat_data:

networks:
  bot_network:
    driver: bridge
